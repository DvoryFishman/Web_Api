<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות לאתר השירים</title>
    <link rel="stylesheet" href="/css/login.css" />
</head>

<body>
    <div id="login-box">        <h2>🎵 התחברות</h2>
        <form id="loginForm" action="#" onsubmit="loginUser(); return false;">
            <label for="username">שם משתמש:</label>
            <input type="text" name="username" id="username" placeholder="הכנס שם משתמש" required>
            
            <label for="password">סיסמה:</label>
            <input type="password" name="password" id="password" placeholder="הכנס סיסמה" required>
            
            <button type="submit">כנס לאתר</button>
        </form>
        <div id="loginError"></div>
        <p class="test-credentials">
            משתמש בדיקה: yael / 1234 (מנהל) או devory / abcd
        </p>
    </div>

    <script src="/js/siteLogin.js"></script>
</body>

</html>
