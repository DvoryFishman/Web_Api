<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתר השירים</title>
    <link rel="stylesheet" href="/css/site.css" />
    <link rel="stylesheet" href="/css/index.css" />
</head>

<body>
    <div class="header">
        <h1>🎵 אתר השירים</h1>
        <div class="header-right">
            <span id="userWelcome" style="margin-right: 20px;">שלום, <strong id="userName"></strong></span>
            <div id="adminControls" style="display: none; margin-right: 20px;">
                <a href="/admin.html" class="admin-btn">ניהול משתמשים</a>
            </div>
            <a href="/user.html" class="profile-btn">פרטיי</a>
            <button onclick="logout()">התנתקות</button>
        </div>
    </div>

    <div class="buttons-section">
        <button onclick="getItems()" class="btn-all-songs">🎵 הצג כל השירים</button>
        <button onclick="getFavorites()" class="btn-favorites">⭐ הצג שירים מועדפים</button>
    </div>

    <div class="add-song-section" id="addSongSection" style="display: none;">
        <h3>✍️ הוסף שיר חדש</h3>
        <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
            <input type="text" id="add-name" placeholder="שם השיר" required>
            <input type="text" id="add-artist" placeholder="שם הזמר" required>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="add-isVocal"> 
                <label for="add-isVocal">ווקאלי</label>
            </div>
            <input type="submit" value="🎤 הוסף">
        </form>
    </div>

    <div id="editForm" style="display:none;">
        <h3>✏️ עריכת שיר</h3>
        <form action="javascript:void(0);" onsubmit="updateItem()">
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" placeholder="שם השיר" required>
            <input type="text" id="edit-artist" placeholder="שם הזמר" required>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="edit-isVocal"> 
                <label for="edit-isVocal">זמרת</label>
            </div>
            <input type="submit" value="💾 שמור">
            <button type="button" onclick="closeInput()" style="background: linear-gradient(135deg, #ef5350 0%, #d32f2f 100%); color: white; padding: 16px 45px; border: none; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(239, 83, 80, 0.3);">❌ ביטול</button>
        </form>
    </div>

    <p id="counter"></p>

    <div class="songs-table">
        <table style="display: none;" id="songsTable">
        <tr>
            <th>ווקאלי?</th>
            <th>שם השיר</th>
            <th>הזמר</th>
            <th>עריכה</th>
            <th>מחיקה</th>
            <th>מועדף</th>
        </tr>
        <tbody id="songs"></tbody>
    </table>
    </div>

    <script src="/js/site.js"></script>
    <script type="text/javascript">
        function checkAuth() {
            if (!token || !userId) {
                window.location.href = '/login.html';
                return;
            }

            const username = localStorage.getItem('username');
            document.getElementById('userName').innerText = username;

            // הצג כפתורי ניהול למנהל
            const role = localStorage.getItem('role');
            if (role === 'Admin') {
                const adminControls = document.getElementById('adminControls');
                if (adminControls) {
                    adminControls.style.display = 'inline-block';
                }
                // הצג את כפתור הוספת שיר רק למנהל
                const addSongSection = document.getElementById('addSongSection');
                if (addSongSection) {
                    addSongSection.style.display = 'block';
                }
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            localStorage.removeItem('userFavorites');
            window.location.href = '/login.html';
        }

        checkAuth();
    </script>
</body>

</html>
